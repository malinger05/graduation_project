<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ATM{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='customer.css') }}">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <span class="logo">ATM</span>
      {% block header_extra %}{% endblock %}
    </header>
    <main class="main">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <ul class="flash-list">
            {% for m in messages %}<li class="flash">{{ m }}</li>{% endfor %}
          </ul>
        {% endif %}
      {% endwith %}
      {% block body %}{% endblock %}
    </main>
  </div>
</body>
</html>
