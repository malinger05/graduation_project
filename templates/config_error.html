{% extends "base.html" %}
{% block title %}Setup required{% endblock %}
{% block body %}
<section class="card">
  <h1>Cannot start ATM</h1>
  <p class="error-detail">{{ error }}</p>
  <p class="muted">Configure <code>.env</code> like <code>atm.py</code> (contract, wallet, Pinata). Then restart this app.</p>
  <p><a href="{{ url_for('login') }}">Back to sign in</a></p>
</section>
{% endblock %}
