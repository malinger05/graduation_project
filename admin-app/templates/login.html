<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — Core Banking</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #e8193c; --navy: #0b1422; --navy2: #111d30; --border: rgba(255,255,255,0.08); --text: #e8eaf0; --muted: #4a6080; }
    body { background: var(--navy); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

    .login-wrap { width: 100%; max-width: 400px; }

    .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; justify-content: center; }
    .login-logo-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--red); display: flex; align-items: center; justify-content: center; }
    .login-logo-text { font-size: 18px; font-weight: 600; }
    .login-logo-sub  { font-size: 12px; color: var(--muted); }

    .login-card {
      background: #111d30;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }

    .login-title { font-size: 20px; font-weight: 400; margin-bottom: 6px; }
    .login-sub   { font-size: 12px; color: var(--muted); margin-bottom: 28px; }

    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
    .field-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .field-wrap { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 9px; padding: 0 14px; transition: border-color 0.2s; }
    .field-wrap:focus-within { border-color: rgba(255,255,255,0.2); }
    .field-wrap svg { color: var(--muted); flex-shrink: 0; }
    .field-wrap input { background: transparent; border: none; outline: none; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; padding: 12px 0; width: 100%; }
    .field-wrap input::placeholder { color: #2a3848; }

    .error-msg { background: rgba(232,25,60,0.08); border: 1px solid rgba(232,25,60,0.18); color: #e07070; border-radius: 8px; padding: 10px 14px; font-size: 12px; margin-bottom: 16px; }

    .login-btn {
      width: 100%; background: var(--red); color: #fff; border: none;
      border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 500;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      transition: opacity 0.2s; margin-top: 8px;
    }
    .login-btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="login-logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div>
      <div class="login-logo-text">Core Banking</div>
      <div class="login-logo-sub">Admin Panel</div>
    </div>
  </div>

  <div class="login-card">
    <h1 class="login-title">Admin sign in</h1>
    <p class="login-sub">Restricted access — authorized personnel only</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="error-msg">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('login') }}">
      <div class="field">
        <label class="field-label">Username</label>
        <div class="field-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" name="username" placeholder="admin" autocomplete="off" required>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <div class="field-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="login-btn">
        Sign in to Admin Panel
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </form>
  </div>
</div>
</body>
</html>
